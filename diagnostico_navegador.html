<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico de Renderização - ERP JSP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .test-item {
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 5px solid #ddd;
        }
        
        .test-item.success {
            background: #d4edda;
            border-left-color: #28a745;
        }
        
        .test-item.error {
            background: #f8d7da;
            border-left-color: #dc3545;
        }
        
        .test-item.warning {
            background: #fff3cd;
            border-left-color: #ffc107;
        }
        
        .test-item h3 {
            margin-bottom: 10px;
        }
        
        .icon {
            font-size: 20px;
            margin-right: 10px;
        }
        
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px 5px;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        .actions {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }
        
        pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            font-size: 12px;
        }
        
        .console-output {
            max-height: 300px;
            overflow-y: auto;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔬 Diagnóstico de Renderização do ERP JSP</h1>
        
        <div id="results"></div>
        
        <div class="console-output" id="console">
            <div>Executando testes...</div>
        </div>
        
        <div class="actions">
            <button onclick="runTests()">🔄 Executar Testes Novamente</button>
            <button onclick="clearCache()">🗑️ Limpar Cache e Recarregar</button>
            <button onclick="openPropostaAnon()">🔒 Abrir em Modo Anônimo</button>
            <button onclick="window.location.href='https://erp-jsp-th5o.onrender.com/propostas/19'">📄 Ir para Proposta 19</button>
        </div>
    </div>
    
    <script>
        const log = (msg) => {
            const console = document.getElementById('console');
            const time = new Date().toLocaleTimeString();
            console.innerHTML += `<div>[${time}] ${msg}</div>`;
            console.scrollTop = console.scrollHeight;
        };
        
        const addResult = (title, message, type = 'success') => {
            const results = document.getElementById('results');
            const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : '⚠️';
            
            results.innerHTML += `
                <div class="test-item ${type}">
                    <h3><span class="icon">${icon}</span>${title}</h3>
                    <p>${message}</p>
                </div>
            `;
        };
        
        async function testCSS(url) {
            try {
                const response = await fetch(url);
                const text = await response.text();
                return {
                    ok: response.ok,
                    status: response.status,
                    size: text.length
                };
            } catch (e) {
                return { ok: false, error: e.message };
            }
        }
        
        async function testJS(url) {
            try {
                const response = await fetch(url);
                const text = await response.text();
                return {
                    ok: response.ok,
                    status: response.status,
                    size: text.length
                };
            } catch (e) {
                return { ok: false, error: e.message };
            }
        }
        
        async function runTests() {
            document.getElementById('results').innerHTML = '';
            document.getElementById('console').innerHTML = '<div>🔄 Iniciando diagnóstico...</div>';
            
            log('Verificando informações do navegador...');
            
            // Teste 1: Informações do navegador
            const userAgent = navigator.userAgent;
            const cookiesEnabled = navigator.cookieEnabled;
            const language = navigator.language;
            
            addResult(
                'Informações do Navegador',
                `User Agent: ${userAgent}<br>Cookies: ${cookiesEnabled ? 'Ativados' : 'Desativados'}<br>Idioma: ${language}`,
                'success'
            );
            
            log('✅ Informações do navegador coletadas');
            
            // Teste 2: LocalStorage
            try {
                localStorage.setItem('test', 'test');
                localStorage.removeItem('test');
                addResult('LocalStorage', 'Funcionando corretamente', 'success');
                log('✅ LocalStorage OK');
            } catch (e) {
                addResult('LocalStorage', `Erro: ${e.message}`, 'error');
                log('❌ LocalStorage com erro');
            }
            
            // Teste 3: Extensões bloqueadoras
            log('Verificando bloqueadores de anúncios...');
            setTimeout(() => {
                const adTest = document.querySelector('.adsbygoogle');
                if (adTest) {
                    addResult('Bloqueador de Anúncios', 'Detectado! Pode estar bloqueando recursos', 'warning');
                    log('⚠️ Bloqueador detectado');
                } else {
                    addResult('Bloqueador de Anúncios', 'Não detectado', 'success');
                    log('✅ Sem bloqueador');
                }
            }, 500);
            
            // Teste 4: CSS do servidor
            log('Testando carregamento de CSS...');
            const cssTests = [
                'https://erp-jsp-th5o.onrender.com/static/css/neon-theme.css',
                'https://erp-jsp-th5o.onrender.com/static/css/form-override.css',
                'https://erp-jsp-th5o.onrender.com/static/css/navigation-enhanced-clean.css'
            ];
            
            for (const cssUrl of cssTests) {
                const result = await testCSS(cssUrl);
                if (result.ok) {
                    addResult(
                        `CSS: ${cssUrl.split('/').pop()}`,
                        `Carregado com sucesso! (${result.size} bytes)`,
                        'success'
                    );
                    log(`✅ CSS ${cssUrl.split('/').pop()} OK`);
                } else {
                    addResult(
                        `CSS: ${cssUrl.split('/').pop()}`,
                        `Erro ao carregar: ${result.error || result.status}`,
                        'error'
                    );
                    log(`❌ CSS ${cssUrl.split('/').pop()} FALHOU`);
                }
            }
            
            // Teste 5: JavaScript do servidor
            log('Testando carregamento de JavaScript...');
            const jsTests = [
                'https://erp-jsp-th5o.onrender.com/static/js/sidebar-scroll.js',
                'https://erp-jsp-th5o.onrender.com/static/js/form-styles.js'
            ];
            
            for (const jsUrl of jsTests) {
                const result = await testJS(jsUrl);
                if (result.ok) {
                    addResult(
                        `JS: ${jsUrl.split('/').pop()}`,
                        `Carregado com sucesso! (${result.size} bytes)`,
                        'success'
                    );
                    log(`✅ JS ${jsUrl.split('/').pop()} OK`);
                } else {
                    addResult(
                        `JS: ${jsUrl.split('/').pop()}`,
                        `Erro ao carregar: ${result.error || result.status}`,
                        'error'
                    );
                    log(`❌ JS ${jsUrl.split('/').pop()} FALHOU`);
                }
            }
            
            // Teste 6: Proposta 19
            log('Testando página da proposta...');
            try {
                const response = await fetch('https://erp-jsp-th5o.onrender.com/propostas/19');
                const html = await response.text();
                
                const hasHeader = html.includes('proposta-header');
                const hasContent = html.length > 100000;
                const hasCSS = html.includes('neon-theme.css');
                
                if (hasHeader && hasContent && hasCSS) {
                    addResult(
                        'Página da Proposta 19',
                        `Página carregando corretamente (${html.length} bytes)`,
                        'success'
                    );
                    log('✅ Proposta 19 OK');
                } else {
                    addResult(
                        'Página da Proposta 19',
                        `Página com problemas: Header=${hasHeader}, Conteúdo=${hasContent}, CSS=${hasCSS}`,
                        'warning'
                    );
                    log('⚠️ Proposta 19 com problemas estruturais');
                }
            } catch (e) {
                addResult('Página da Proposta 19', `Erro: ${e.message}`, 'error');
                log(`❌ Erro ao carregar proposta: ${e.message}`);
            }
            
            log('✅ Diagnóstico completo!');
        }
        
        function clearCache() {
            if (confirm('Isso vai recarregar a página e tentar limpar o cache. Continuar?')) {
                window.location.reload(true);
            }
        }
        
        function openPropostaAnon() {
            alert('Abra uma janela anônima (Ctrl+Shift+N) e cole esta URL:\\n\\nhttps://erp-jsp-th5o.onrender.com/propostas/19');
        }
        
        // Executar testes automaticamente ao carregar
        window.addEventListener('DOMContentLoaded', runTests);
    </script>
</body>
</html>
